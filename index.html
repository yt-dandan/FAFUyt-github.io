<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcGIS + Leaflet 地图实验 - 底图必现版</title>

  <!-- Leaflet 底图库 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ArcGIS JS API -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:微软雅黑; }
    .header {
      height:60px;
      background:#005a9c;
      color:white;
      text-align:center;
      line-height:60px;
      font-size:22px;
      font-weight:bold;
    }
    .main {
      display:flex;
      height:calc(100vh - 60px);
    }
    #mapContainer {
      flex:1;
      position:relative;
    }
    #leafletMap {
      width:100%;
      height:100%;
      z-index:0;
    }
    #arcgisOverlay {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      pointer-events:none;
      z-index:1;
    }
    #arcgisOverlay > div {
      pointer-events:auto;
    }
    .panel {
      width:260px;
      background:#f8f9fa;
      padding:15px;
      border-left:2px solid #ddd;
    }
    .panel h3 {
      margin-bottom:12px;
      color:#333;
      border-left:4px solid #005a9c;
      padding-left:8px;
    }
    .item {
      padding:10px;
      background:white;
      margin:8px 0;
      border-radius:6px;
      cursor:pointer;
      text-align:center;
      border:1px solid #ccc;
      transition:0.2s;
    }
    .item:hover {
      background:#e6f2ff;
      border-color:#005a9c;
    }
  </style>
</head>
<body>

  <!-- 1. 页眉区域 -->
  <div class="header">ArcGIS 地图实验 - 底图必现版</div>

  <!-- 2. 主体：地图 + 底图库 -->
  <div class="main">
    <div id="mapContainer">
      <!-- Leaflet 高德底图 -->
      <div id="leafletMap"></div>
      <!-- ArcGIS 专题图层与微件 -->
      <div id="arcgisOverlay"></div>
    </div>

    <!-- 3. 底图库区域 -->
    <div class="panel">
      <h3>底图切换</h3>
      <div class="item" onclick="setBase('vec')">高德矢量地图</div>
      <div class="item" onclick="setBase('img')">高德影像地图</div>
    </div>
  </div>

<script>
// --------------------------
// 1. Leaflet 加载高德底图（必现）
// --------------------------
const map = L.map('leafletMap', { zoomControl: false }).setView([39.90, 116.40], 4);

const amapVec = L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  attribution: '© 高德地图'
}).addTo(map);

const amapImg = L.tileLayer('https://webst01.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
  attribution: '© 高德地图'
});

window.setBase = function(type) {
  if (type === 'vec') {
    map.removeLayer(amapImg);
    amapVec.addTo(map);
  } else {
    map.removeLayer(amapVec);
    amapImg.addTo(map);
  }
};

// --------------------------
// 2. ArcGIS 加载专题图层与微件
// --------------------------
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/widgets/ScaleBar",
  "esri/widgets/Legend",
  "esri/widgets/Search",
  "esri/widgets/LayerList"
], function(Map, MapView, FeatureLayer, ScaleBar, Legend, Search, LayerList) {

  const arcMap = new Map({});

  const view = new MapView({
    container: "arcgisOverlay",
    map: arcMap,
    center: [116.40, 39.90],
    zoom: 4,
    background: { color: [0, 0, 0, 0] } // 透明背景，不遮挡底图
  });

  // 加载世界城市专题图层
  const cityLayer = new FeatureLayer({
    url: "https://services.arcgis.com/P3ePLMYs2RVChkJx/arcgis/rest/services/World_Cities/FeatureServer/0",
    title: "世界主要城市"
  });
  arcMap.add(cityLayer);

  // 所有必选微件
  view.ui.add(new ScaleBar({ view: view, unit: "metric" }), "bottom-left");
  view.ui.add(new Legend({ view: view }), "bottom-right");
  view.ui.add(new Search({ view: view }), "top-right");
  view.ui.add(new LayerList({ view: view }), "top-left");

  // 同步 Leaflet 与 ArcGIS 地图的视图
  map.on('moveend', function() {
    const center = map.getCenter();
    const zoom = map.getZoom();
    view.center = [center.lng, center.lat];
    view.zoom = zoom;
  });
});
</script>
</body>
</html>
